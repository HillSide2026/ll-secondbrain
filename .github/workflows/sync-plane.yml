name: Sync Plane Tickets

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-plane:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Sync Plane tickets
        run: npm run sync:plane
        env:
          PLANE_API_KEY: ${{ secrets.PLANE_API_KEY }}
          PLANE_WORKSPACE_SLUG: ${{ secrets.PLANE_WORKSPACE_SLUG }}
          PLANE_API_BASE_URL: ${{ secrets.PLANE_API_BASE_URL }}

      - name: Commit synced tickets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Sync Plane ticket snapshots"
          file_pattern: "04_INITIATIVES/**/*.md 05_MATTERS/**/*.md"
