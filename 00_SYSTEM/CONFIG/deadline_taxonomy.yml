deadline_types:
  - id: HARD_DEADLINE
    label: Hard deadline
    definition: Contractual, regulatory, statutory, or closing date.
    risk_level: high
  - id: SOFT_DEADLINE
    label: Soft deadline
    definition: Requested turnaround or expected delivery date.
    risk_level: medium
  - id: INTERNAL_TARGET
    label: Internal target
    definition: Internal planning milestone.
    risk_level: low

escalation:
  overdue_hard_deadline: immediate_ml1_flag
  due_within_days:
    hard: 3
    soft: 2
    internal: 1
