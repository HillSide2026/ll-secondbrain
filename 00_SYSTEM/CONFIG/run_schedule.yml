id: 00_system__config__run_schedule
title: Matter Admin and Matter File Admin Run Schedule
owner: ML1
status: draft
created_date: 2026-03-04
last_updated: 2026-03-28

runs:
  daily:
    run_id: RUN_MATTER_ADMIN_DAILY
    enabled: true
    timezone: America/Toronto
    schedule_local: '06:30'
    scope:
      gmail_query: in:inbox
      include_labels: true
      include_sharepoint: true
      include_deadline_extractor: false
      include_comms_drafts: false
  one_matter:
    run_id: RUN_MATTER_ADMIN_ONE
    enabled: true
    requires_matter_number: true
  matter_file_daily:
    run_id: RUN_MATTER_FILE_ADMIN_DAILY
    enabled: false
    note: Planned standalone split. Current document-delta execution remains bundled in RUN_MATTER_ADMIN_DAILY.
  matter_file_one:
    run_id: RUN_MATTER_FILE_ADMIN_ONE
    enabled: false
    requires_matter_number: true
    note: Planned standalone split. No dedicated runner mode is active yet.

digest:
  stalled_days: 14
  active_window_days: 7
