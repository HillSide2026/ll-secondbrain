id: 00_system__config__run_schedule
title: Operational Run Schedule
owner: ML1
status: draft
created_date: 2026-03-04
last_updated: 2026-04-02

runs:
  daily_full_sweep:
    run_id: RUN_DAILY_FULL_SWEEP
    enabled: true
    timezone: America/Toronto
    schedule_local: '06:30'
    description: >
      End-to-end daily chain. Replaces standalone matter admin invocation.
      Sequence: Matter Admin → Portfolio Agents (LLM-004/005/006) → Chief of Staff (LLM-001).
    runner: 00_SYSTEM/scripts/run_daily_full_sweep.py
    installer: 00_SYSTEM/scripts/install_daily_sweep_launch_agent.py
    launchd_label: ca.levinelaw.ml2.daily-sweep
  daily:
    run_id: RUN_MATTER_ADMIN_DAILY
    enabled: false
    note: Superseded by RUN_DAILY_FULL_SWEEP. Retained for standalone matter-admin-only invocation if needed.
    timezone: America/Toronto
    schedule_local: '06:30'
    scope:
      gmail_query: in:inbox
      include_labels: true
      include_sharepoint: true
      include_deadline_extractor: false
      include_comms_drafts: false
  one_matter:
    run_id: RUN_MATTER_ADMIN_ONE
    enabled: true
    requires_matter_number: true
  matter_file_daily:
    run_id: RUN_MATTER_FILE_ADMIN_DAILY
    enabled: false
    note: Planned standalone split. Current document-delta execution remains bundled in RUN_MATTER_ADMIN_DAILY.
  matter_file_one:
    run_id: RUN_MATTER_FILE_ADMIN_ONE
    enabled: false
    requires_matter_number: true
    note: Planned standalone split. No dedicated runner mode is active yet.
  weekly_cycle:
    run_id: RUN_WEEKLY_CYCLE
    enabled: true
    timezone: America/Toronto
    schedule_local: '09:00'
    schedule_day: Monday
    description: >
      Weekly system management sweep. Sequence: System Admin Sweep (SAA) → System Management Sweep (SMA-001..005).
    runner: 00_SYSTEM/scripts/run_weekly_cycle.py
    installer: 00_SYSTEM/scripts/install_weekly_cycle_launch_agent.py
    launchd_label: ca.levinelaw.ml2.weekly-cycle
  trade_remedies_citt_daily:
    run_id: RUN_TRADE_REMEDIES_CITT_DAILY
    enabled: true
    timezone: America/Toronto
    schedule_local: '07:15'
    scope:
      watches:
        - watchlist: 05_MATTERS/ESSENTIAL/26-1639-00002/CITT_WATCHLIST.yaml
          report: 05_MATTERS/ESSENTIAL/26-1639-00002/CITT_SIGNAL_REPORT.md
          state: 06_RUNS/state/citt_scan_26-1639-00002.json

digest:
  stalled_days: 14
  active_window_days: 7
