schema_version: 0.1
id: matter_admin_one
name: Matter Admin One Matter
description: On-demand Matter Administration run scoped to a single matter number with governed Gmail label-write boundaries. Matter File Administration remains separately defined and only partially bundled in the current runtime.
bundle: matter_admin_one
transitional_note: no standalone scoped Matter File Administration runner is active yet; this graph remains matter-admin focused.
gates:
  - ml1_approval_required
  - no_unapproved_source_writeback
  - citation_pointer_required
steps:
  - id: load_clio_matter
    action: connector_clio_read
  - id: load_gmail_threads
    action: connector_gmail_read
  - id: route_for_matter
    action: agent_inbox_router_scoped
  - id: review_gmail_threads
    action: agent_inbox_state_review_scoped
    outputs:
      - path: 06_RUNS/batch/proposals/
        label: BATCH_PROPOSAL
  - id: compile_matter_status
    action: agent_matter_digest_scoped
run_logging:
  runlog: 06_RUNS/logs/matter_admin/runlog.md
  provenance: 06_RUNS/logs/matter_admin/provenance.json
