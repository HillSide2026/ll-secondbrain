  - 2026-03-06: Drive IDs verified via live Graph API. Added site_ids. Updated LegalMatters drive name to "Working Files". Added Parked/StandardCashCows/DataManagement/ModelFile folders confirmed in root enumeration. Marked LegalMatters write_policy PROHIBITED.
  - 2026-03-11: Write access to Documentation/DRAFTS is ML1-approved. Implemented in sharepoint_mcp_server.py (upload_draft tool). sharepoint_integration.py intentionally remains read-only.
  - 2026-03-27: Documentation elevated to managed-workspace authority at the site level (read/write/manage). DRAFTS retained as a known workspace path, not the exclusive write surface.
  - 2026-03-27: Added Clients site as an explicitly identified portal-linked SharePoint reference. Access confirmed via live connector; policy classification and runtime tooling scope remain pending.
  - "2026-03-27: Recorded the intended Clients portal pattern: branded sign-in, shared credentialed home page, client-specific navigation, and client-scoped library links."
  - "2026-03-27: Expanded the repo MCP runtime boundary to include read-only Clients site library aliases."
  - "2026-03-27: Expanded the Documentation MCP tool surface to include allowlisted template lookup, diffing, and template-to-WIP copy."

