id: 00_system__integrations__gmail__sources_yaml
title: Gmail Sources
owner: ML1
status: active
version: 2.0
created_date: 2026-02-15
last_updated: 2026-03-14
sources:
  - source_id: GMAIL_MAILBOX
    description: Primary Gmail mailbox messages and metadata.
    location: Gmail account configured via env (GMAIL_CLIENT_ID/SECRET/REFRESH_TOKEN)
    authority: unknown
    classification: intake
    ingestion: Read via GmailClient, fetch_gmail.py, or gmail_mcp_server.py
  - source_id: GMAIL_LABELS
    description: State and matter routing labels applied to threads.
    location: Gmail labels (LL/*) applied by gmail_labeler.py
    authority: unknown
    classification: execution_artifact
    ingestion: Applied via gmail_labeler.py or gmail_mcp_server.py with explicit approval inputs
    enabled: true
    approval_required: ML1 controlled write approval
ingestion:
  triggers:
    - Manual run of fetch_gmail.py
    - Manual run of gmail_labeler.py
    - MCP tool calls via gmail_mcp_server.py
  notes:
    - Read activity is logged to 06_RUNS/logs/gmail_audit.log
    - MCP write activity is logged to 06_RUNS/ops/gmail_mcp_audit.ndjson
consumers:
  scripts:
    - 00_SYSTEM/scripts/gmail_integration.py
    - 00_SYSTEM/scripts/fetch_gmail.py
    - 00_SYSTEM/scripts/gmail_labeler.py
    - 00_SYSTEM/scripts/run_pilot.py
    - scripts/gmail_mcp_server.py
  playbooks: []
  run_graphs: []
related_artifacts:
  - 00_SYSTEM/matters/matter_identity_map.yaml
change_notes:
  - participant_mapping.yaml canonical path is 00_SYSTEM/participant_mapping.yaml
