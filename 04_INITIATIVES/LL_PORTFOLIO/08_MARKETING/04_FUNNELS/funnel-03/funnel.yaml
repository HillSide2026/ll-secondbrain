meta:
  id: funnel-03
  name: Fintech Authority + Levine Law Conversion
  status: planned
  owner: Levine Law
  version: 3.0.0
  last_updated: '2026-04-25'
  execution_state: gated
  execution_substages:
    - pre-launch
    - launch

lineage:
  type: independent
  of: null
  state: null
  renumbered_from: funnel-02
  note: Previously tracked as Funnel 02; renumbered to Funnel 03 to free Funnel 02 for F1 future-state.

description: >
  Funnel 3 is a Levine Law funnel spanning fintechlawyer.ca (discovery and
  education) and the Levine Law site (credibility and conversion). It is not
  product-driven and does not host primary content outside the authority layer.

architecture:
  discovery_education:
    domain: fintechlawyer.ca
    owner: Levine Professional Corporation
    controlling_artifact: 04_INITIATIVES/LL_PORTFOLIO/08_MARKETING/FINTECHLAWYER_AUTHORITY_SITE.md
    role:
      - authority_content
      - issue_education
      - trust_building
      - initial_lead_capture

  credibility_conversion:
    domain: Levine Law site
    role:
      - firm_validation
      - consultation_booking
      - mandate_conversion

product:
  name: FinSure
  domain: finsure.dominionpartners.ca
  relationship: excluded_from_funnel_3

stages:
  - discovery:
      source: fintechlawyer.ca

  - education:
      mechanisms:
        - blog_content
        - regulatory_guides
        - email_capture

  - qualification:
      signals:
        - fintrac_issue
        - compliance_review_need
        - amp_risk
        - payment_structuring_need

  - conversion:
      action: legal_consultation
      destination: Levine Law

structure:
  positioning: positioning.yaml
  target: target.yaml
  traffic: traffic.yaml
  intake: intake.yaml
  pipeline: pipeline.yaml
  metrics: metrics.yaml

spec:
  offer:
    primary: Payments / MSB / PSP counsel
    entry_offers:
      - EO1: FINTRAC Compliance and Reporting Obligations
      - EO2: Suspicious Transaction Triage and STR Drafting
      - EO3: AML Program Health Check
      - EO4: Payment Token and Digital Asset Regulatory Structuring
    core_offers:
      - Ongoing AML and Payments Regulatory Counsel Retainer

