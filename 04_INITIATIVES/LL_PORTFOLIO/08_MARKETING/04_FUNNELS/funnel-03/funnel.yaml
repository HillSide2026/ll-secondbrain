    fintechlawyer.ca (discovery and education) and the Levine Law site
    (credibility and conversion). Product layer removed: FinSure is excluded
    from Funnel 3 and operates at finsure.dominionpartners.ca. Two-layer
    architecture, stage definitions, and qualification signals added.
    FINTECHLAWYER_AUTHORITY_SITE.md established as the controlling artifact
    for the fintechlawyer.ca layer. EO1 renamed to reflect FINTRAC compliance
    framing rather than MSB registration mandate framing.
