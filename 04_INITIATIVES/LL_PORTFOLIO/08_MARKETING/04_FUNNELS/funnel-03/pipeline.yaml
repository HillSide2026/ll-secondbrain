system: ghl

stages:
  - lead_captured
  - screened
  - booked
  - consult_complete
  - retained
  - closed_lost

sub_stages:
  lead_captured:
    - new_lead        # opted in, no contact made
    - contacted       # first contact attempted or made

  screened:
    - intake_submitted  # intake/screening form complete
    - setter_qualified  # setter confirms basic fit and routing path; no legal advice
    - lawyer_pre_scope_fit # lawyer confirms conflicts/scope fit and next paid step; no legal advice

  booked:
    - setter_call_booked      # qualification call scheduled
    - lawyer_pre_scope_booked # suitability/pre-scope call scheduled
    - paid_triage_booked      # paid consult scheduled
    - consult_confirmed       # confirmed; reminder sent

  consult_complete:
    - setter_call_complete       # attended setter qualification call
    - lawyer_pre_scope_complete  # attended lawyer pre-scope call
    - paid_triage_complete       # attended paid triage consult
    - proposal_sent              # engagement letter or scope sent

  retained:
    - retained          # engagement executed

  closed_lost:
    - unqualified       # failed qualification gates
    - no_show           # booked but did not show
    - no_decision       # consult complete, no engagement
    - lost_to_competitor

contact_fields:
  - entry_offer         # EO1 | EO2 | EO3 — tag on contact, not a pipeline stage
  - acquisition_source  # content | networking | paid_ads
  - call_layer          # setter_qualification | lawyer_pre_scope | paid_triage
