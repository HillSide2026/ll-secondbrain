summary: ICP-03 is the F03 payments / regulatory audience with a Canada-connected primary lane and an emerging-markets tokenized-payments secondary lane.

primary_profile:
  label: Canada-connected payments operator or manager
  summary: Canada-connected payments operators or managers with live regulatory, compliance, reporting, or payments-structure needs.

secondary_profile:
  label: Emerging-markets stablecoin or tokenized-payments operator
  summary: International emerging-markets stablecoin or tokenized-payments operators whose legal/commercial risk is driven by strategic-partnership architecture, even before a Canada nexus exists.

focus_areas:
  - fintech
  - payments companies
  - MSBs
  - RPAA registrants
  - stablecoin participants
  - strategic partnership architecture
  - trade finance
  - supply chain finance
  - treasury-as-a-service
  - stablecoin treasury-as-a-service
  - payments-as-a-service
  - banking-as-a-service
  - embedded finance
  - cash management infrastructure

core_identity: Decision-maker in a payments business where regulatory classification, reporting obligations, or strategic-partnership structure affects capital, banking access, or launch viability.

roles:
  - Founder / Co-Founder (fintech)
  - CEO (growth-stage)
  - COO / Head of Operations
  - Head of Payments
  - Head of Compliance (commercially minded)
  - Product lead responsible for payments rails or stablecoin infrastructure
  - CFO where regulatory exposure affects capital planning

geography:
  primary: Canada-connected
  secondary: international emerging markets

business_profile:
  stage: pre-launch to growth
  revenue_range: varies (can be pre-revenue but funded)
  funding_profile: venture-backed, growth-financed, or planning to raise
  operating_reality:
    - integrating payments rails or digital asset flows
    - facing MSB registration questions
    - facing RPAA registration questions
    - stablecoin classification uncertainty
    - custody and safeguarding requirements
    - bank reaction and onboarding risk
    - reporting obligations
    - sponsor-bank, processor, issuer, or infrastructure partner dependence
    - strategic partnership contracts shape legal and commercial risk
    - trade finance workflows such as LC digitization, documentary collections, and receivables financing
    - buyer-led payables financing, dynamic discounting, or other supply-chain finance structures
    - treasury-as-a-service, cash positioning, liquidity, FX, virtual accounts, or payment orchestration
    - stablecoin treasury operations, settlement, reserves, custody, on/off-ramp orchestration, or cross-border money movement
    - API-based pay-ins, payouts, wallets, acquiring, banking rails, or embedded finance
    - sweeping, pooling, reconciliation, or multi-bank cash management infrastructure

maturity_triggers:
  - investor diligence flags regulatory uncertainty
  - banking partner asks classification questions
  - payments partner requires confirmation of status
  - stablecoin architecture moves from idea to implementation
  - cross-border expansion triggers Canadian registration issues
  - product design depends on regulatory perimeter decisions
  - strategic partnership negotiation exposes structural or regulatory weakness

conversion_mode: Capital consequences, not fear or crisis.

psych_profile:
  traits:
    - thinks structurally
    - appreciates nuance
    - understands trade-offs
    - cares about defensibility
    - values sequencing
    - wants clarity before committing capital
  avoids:
    - alarmist compliance lectures
    - generic blog content
    - academic essays detached from commercial reality
  wants:
    - clear perimeter framing
    - order of operations for regulatory decisions
    - commercially grounded guidance
    - institutional-grade judgment without major-firm pricing

engagement_economics:
  target_matter_value: CAD 10,000+ (problems worth less than this are not the target)
  absolute_floor: CAD 5,000 (ref LLPRN-28 — below-floor requires ML1-approved justification)
  note: F03 clients typically have capital at risk and regulatory exposure that justifies five-figure engagements; problem size is the primary qualification signal

economic_buyer:
  budget_profile:
    - accepts five-figure engagements
    - budget for specialized regulatory advice
    - capital at risk justifies proper structuring
    - cannot support Wall Street, City, or Bay Street rates on an ongoing basis
  relationship_potential: May evolve into long-term advisory relationship

counsel_preference:
  - would prefer a Wall Street, City, or Bay Street law firm if budget permitted
  - wants similar strategic rigor at an acceptable price point

excludes:
  - retail crypto traders
  - hobby projects
  - pure tax-only questions
  - one-off incorporation requests
  - is crypto legal general queries
  - casual informational seekers without operational plans
  - problems with expected engagement value below CAD 10,000 unless strategic exception applies

typology:
  funnel: F3
  domain: fintech / payments regulatory
  buyer_type: decision-makers
  revenue_model: higher margin advisory
