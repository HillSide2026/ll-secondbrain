system: ghl
ghl_pipeline_name: "LL - Corporate (New)"
ghl_pipeline_id: FD64V3fmW7sKvaJKjSVw
ghl_sync_status: out_of_sync  # GHL stages do not match canonical spec; standardization assigned to GHL specialist
ghl_note: A second pipeline "LL - Corporate (Google)" (id emVIxH1FUQbwMM1MVW5V) also exists in GHL — governance decision pending on which to retire

ghl_actual_stages:
  - New Lead
  - Welcoming
  - Nurturing
  - Qualified
  - Consult Booked
  - Rescheduled / No-Show
  - Consultation Completed
  - Engagement Sent
  - Retained (Closed – Won)
  - Closed – Not Proceeding
  - Disqualified

# Canonical stage spec (ML1-approved 2026-06-07)
# Replaces prior health-check-centric stage model.
# Single pipeline. "Worked" = first outreach attempt (call, no answer).
# Stage/status separation enforced: no-show, rescheduled, unresponsive are
# contact/opportunity status fields, not stages.
stages:
  - new_lead
  - worked
  - qualified
  - consult_booked
  - consult_completed
  - engagement_out
  - retained
  - closed_lost

stage_ownership:
  new_lead: intake
  worked: intake
  qualified: intake
  consult_booked: intake
  consult_completed: shared_handoff
  engagement_out: ml1
  retained: ml1
  closed_lost: shared_handoff

custom_fields:
  - name: Lead In Date
    type: date
    purpose: Anchor for speed-to-work SLA calculation
  - name: First Worked Date
    type: datetime
    purpose: Stamped once by automation when opportunity first moves to Worked; never overwritten
    automation: on stage change to worked, if empty, write current timestamp
  - name: Speed to Work SLA
    type: pass_fail
    purpose: Flags leads not worked within SLA threshold; calculated from First Worked Date minus Lead In Date
  - name: Outreach Attempts
    type: integer
    purpose: Increments per automation each time a call or outreach task is logged; drives max-attempt disposition rule
