# Ideal Client Profile — Funnel 02

# ---
# NOTE: This file contains ICP only.
# Acquisition thesis (triggers, messaging, psychographic framing, what they're buying)
# belongs in positioning.yaml and the funnel acquisition thesis document.
# ---

firmographics:
  geography: Based in or operating in Ontario (or with legal exposure there)
  annual_cash_flow_gate: CAD 5M+ unless ML1 exception applies
  structure: Incorporated, multiple shareholders
  industry_focus:
    - Consumer, Food & Agri-business
    - Manufacturing, Wholesale & Distribution
    - Professional Services & Healthcare

operational_characteristics:
  # These are the real qualification triggers — must meet these to qualify
  contract_complexity:
    - Multiple active supplier and/or customer agreements in circulation
    - Custom contracts (not off-the-shelf templates)
  cross_border_or_multi_jurisdiction:
    - Selling into or buying from outside Canada
    - Exposure to US or international law
  no_full_inhouse_legal:
    - May have a legal manager or coordinator
    - Does not have a full in-house legal department
  recurring_legal_needs:
    - Not a one-time issue
    - Ongoing contract review, negotiation, or disputes

typical_legal_needs:
  - Commercial contracts (supply, distribution, manufacturing)
  - Cross-border agreements (Canada–US focus)
  - Bounded regulatory and compliance guidance incidental to corporate or commercial needs
  - Dispute prevention and resolution
  - Corporate structuring and transactions
  - Fintech corporate, contracts, governance, and financing-readiness issues where the primary issue is not MSB/RPAA/AML/payments-regulatory classification

decision_makers:
  - Owner / Founder
  - CEO / Managing Director
  - CFO / Finance Director

disqualifiers:
  do_not_target:
    - Individuals and personal legal matters
    - Businesses below CAD 5M annual cash flow unless ML1 grants an exception
    - One-off legal issues with no ongoing need
    - Price shoppers
    - Startups without revenue
    - MSB, RPAA, AML, STR, payments-infrastructure, stablecoin settlement, PSP, or payments-regulatory classification matters that should route to F03
  red_flags:
    - No clear business model
    - No decision-maker involved in the conversation
    - Urgent timeline combined with low budget
    - "Just need a quick template"
